<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceForm AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0a1a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-violet: #7c3aed;
            --accent-cyan: #06b6d4;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(124, 58, 237, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.15) 0%, transparent 40%);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10h1v1h-1z' fill='%23ffffff' fill-opacity='0.05'/%3E%3C/svg%3E");
            z-index: -1;
        }

        .container {
            display: flex;
            width: 95%;
            max-width: 1200px;
            height: 85vh;
            gap: 20px;
            padding: 20px;
        }

        .assistant-panel {
            flex: 0 0 320px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .avatar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan));
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
        }

        .avatar::after {
            content: "";
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            border: 2px solid transparent;
            background: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan)) border-box;
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .status-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            color: var(--accent-cyan);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .chat-bubble {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            max-height: 150px;
            overflow-y: auto;
        }

        .transcript-box {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 16px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-style: italic;
            overflow-y: auto;
            border: 1px dashed var(--glass-border);
        }

        .mic-button {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--accent-violet);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            margin: 0 auto;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        .mic-button.active {
            background: var(--error);
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .rate-limit-indicator {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-align: center;
        }

        .form-panel {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-container {
            flex-grow: 1;
            margin-left: 40px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, var(--accent-violet), var(--accent-cyan));
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-left: 4px;
        }

        input, select, textarea {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-cyan);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
        }

        .field-highlight {
            animation: highlight 1.5s ease-out;
        }

        @keyframes highlight {
            0% { box-shadow: 0 0 0 2px var(--accent-cyan); transform: scale(1.02); }
            100% { box-shadow: 0 0 0 0 transparent; transform: scale(1); }
        }

        .field-success {
            border-color: var(--success) !important;
        }

        .field-success-icon {
            position: absolute;
            right: 12px;
            top: 36px;
            color: var(--success);
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .field-success .field-success-icon {
            opacity: 1;
        }

        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .skill-tag {
            padding: 4px 12px;
            border-radius: 16px;
            background: rgba(124, 58, 237, 0.2);
            border: 1px solid rgba(124, 58, 237, 0.3);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .radio-group, .checkbox-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .radio-item, .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        button.submit-btn {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(to right, var(--accent-violet), var(--accent-cyan));
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: not-allowed;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        button.submit-btn.enabled {
            cursor: pointer;
            opacity: 1;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }

        .hidden { display: none; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <aside class="assistant-panel">
            <div class="avatar-container">
                <div class="avatar" id="ai-avatar">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                </div>
                <div class="status-badge" id="app-status">Ready</div>
            </div>

            <div class="chat-bubble" id="ai-reply">
                "Initializing..."
            </div>

            <div class="transcript-box" id="user-transcript">
                Transcription will appear here...
            </div>

            <button class="mic-button" id="mic-btn" title="Toggle Microphone">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
            </button>

            <div class="rate-limit-indicator">
                <span id="session-count">0</span>/20 session calls used
                <div id="cooldown-timer" style="color: var(--warning); font-weight: bold; margin-top: 5px;" class="hidden">Cooldown: 3s</div>
            </div>
        </aside>

        <main class="form-panel">
            <div class="form-header">
                <h1>Personal Onboarding</h1>
                <div class="progress-container">
                    <div class="progress-bar" id="form-progress"></div>
                </div>
            </div>

            <form id="onboarding-form" onsubmit="return false;">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" name="fullName" placeholder="e.g. John Doe">
                        <span class="field-success-icon">✓</span>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="john@example.com">
                        <span class="field-success-icon">✓</span>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000">
                        <span class="field-success-icon">✓</span>
                    </div>

                    <div class="form-group">
                        <label for="occupation">Occupation</label>
                        <input type="text" id="occupation" name="occupation" placeholder="e.g. Software Engineer">
                        <span class="field-success-icon">✓</span>
                    </div>

                    <div class="form-group">
                        <label for="experience">Years of Experience</label>
                        <input type="number" id="experience" name="experience" min="0" placeholder="0">
                        <span class="field-success-icon">✓</span>
                    </div>

                    <div class="form-group full-width">
                        <label for="skills-input">Skills (Press Enter to add)</label>
                        <input type="text" id="skills-input" placeholder="e.g. JavaScript, AI, Design">
                        <div class="skills-container" id="skills-list"></div>
                        <span class="field-success-icon">✓</span>
                    </div>


                </div>

                <button type="submit" class="submit-btn" id="submit-form">Complete Onboarding</button>
            </form>
        </main>
    </div>

    <script type="module">
        const CONFIG = {
            MODEL_NAME: 'gemini-2.5-flash',
            MAX_SESSION_CALLS: 20,
            COOLDOWN_MS: 3000,
            MAX_TOKENS: 300,
            FIELD_HIGHLIGHT_CLASS: 'field-highlight',
            FIELD_SUCCESS_CLASS: 'field-success'
        };

        // --- State Management ---
        const state = {
            apiKey: import.meta.env.VITE_GEMINI_API_KEY || '',
            sessionCalls: 0,
            lastCallTime: 0,
            isListening: false,
            isSpeaking: false,
            currentTranscript: '',
            formFields: [
                'fullName', 'email', 'phone',
                'occupation', 'experience', 'skills'
            ],
            skills: []
        };

        // --- DOM Elements ---
        const elements = {
            micBtn: document.getElementById('mic-btn'),
            aiReply: document.getElementById('ai-reply'),
            userTranscript: document.getElementById('user-transcript'),
            appStatus: document.getElementById('app-status'),
            sessionCount: document.getElementById('session-count'),
            cooldownTimer: document.getElementById('cooldown-timer'),
            formProgress: document.getElementById('form-progress'),
            onboardingForm: document.getElementById('onboarding-form'),
            submitBtn: document.getElementById('submit-form'),
            skillsInput: document.getElementById('skills-input'),
            skillsList: document.getElementById('skills-list')
        };

        // --- Rate Limiter ---
        class RateLimiter {
            static canCall() {
                const now = Date.now();
                if (state.sessionCalls >= CONFIG.MAX_SESSION_CALLS) {
                    this.showStatus('Session Limit Reached', 'error');
                    return false;
                }
                if (now - state.lastCallTime < CONFIG.COOLDOWN_MS) {
                    this.showCooldown();
                    return false;
                }
                return true;
            }

            static recordCall() {
                state.sessionCalls++;
                state.lastCallTime = Date.now();
                elements.sessionCount.textContent = state.sessionCalls;
            }

            static showCooldown() {
                elements.cooldownTimer.classList.remove('hidden');
                let remaining = 3;
                const interval = setInterval(() => {
                    remaining--;
                    elements.cooldownTimer.textContent = `Cooldown: ${remaining}s`;
                    if (remaining <= 0) {
                        clearInterval(interval);
                        elements.cooldownTimer.classList.add('hidden');
                        elements.cooldownTimer.textContent = 'Cooldown: 3s';
                    }
                }, 1000);
            }

            static showStatus(msg, type) {
                elements.appStatus.textContent = msg;
                elements.appStatus.style.color = type === 'error' ? 'var(--error)' : 'var(--accent-cyan)';
            }
        }

        // --- Speech Recognition ---
        const Recognition = (function() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Speech recognition not supported in this browser. Try Chrome.");
                return null;
            }

            const rec = new SpeechRecognition();
            rec.continuous = true;
            rec.interimResults = true;
            rec.lang = 'en-US';

            rec.onstart = () => {
                state.isListening = true;
                elements.micBtn.classList.add('active');
                RateLimiter.showStatus('Listening...', 'active');
            };

            rec.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        state.currentTranscript = event.results[i][0].transcript;
                        handleVoiceInput(state.currentTranscript);
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                elements.userTranscript.textContent = interimTranscript || state.currentTranscript;
            };

            rec.onerror = () => { stop(); };
            rec.onend = () => {
                state.isListening = false;
                elements.micBtn.classList.remove('active');
                RateLimiter.showStatus('Ready', 'idle');
            };

            function start() { rec.start(); }
            function stop() { rec.stop(); }

            return { start, stop, isListening: () => state.isListening };
        })();

        // --- Speech Synthesis ---
        const Speaker = {
            speak(text) {
                if (!text) return;
                window.speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(text);
                utter.onstart = () => { state.isSpeaking = true; RateLimiter.showStatus('Speaking...', 'active'); };
                utter.onend = () => { state.isSpeaking = false; RateLimiter.showStatus('Ready', 'idle'); };
                window.speechSynthesis.speak(utter);
            }
        };

        // --- Gemini AI Brain ---
        async function callGemini(userInput) {
            if (!state.apiKey) {
                console.error("Gemini API Key missing in .env");
                elements.aiReply.textContent = "Error: API Key missing in .env file.";
                return;
            }

            if (!RateLimiter.canCall()) return;

            RateLimiter.recordCall();
            RateLimiter.showStatus('Thinking...', 'active');

            const formState = {};
            state.formFields.forEach(f => {
                const el = document.getElementById(f);
                if (el) {
                    if (el.type === 'checkbox') formState[f] = el.checked;
                    else if (el.type === 'radio') {
                        const checked = document.querySelector(`input[name="${f}"]:checked`);
                        formState[f] = checked ? checked.value : '';
                    }
                    else formState[f] = el.value;
                }
            });
            formState.skills = state.skills;

            const systemPrompt = `You are a friendly voice assistant helping a user fill out a form.\nForm: ${JSON.stringify(formState)}\n\nRespond with a single JSON object (e.g. {"action": "fill", "field": "fullName", "value": "John Doe"}) and then your spoken reply on a new line.\nIMPORTANT: Only use EXACTLY these field names: ${state.formFields.join(', ')}. DO NOT wrap the JSON in markdown code blocks (\`\`\`json). Just output raw JSON followed by text.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.MODEL_NAME}:generateContent?key=${state.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt + "\nUser: " + userInput }] }]
                    })
                });

                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} - ${data.error?.message || 'Unknown error'}`);
                }

                if (data.candidates && data.candidates.length > 0) {
                    const text = data.candidates[0].content.parts[0].text;
                    processAIResponse(text);
                } else {
                    throw new Error("No response candidates from Gemini API.");
                }
            } catch (err) {
                console.error("Fetch Error: ", err);
                RateLimiter.showStatus('API Error', 'error');
                elements.aiReply.textContent = "I had trouble connecting. Check your API key in .env";
            }
        }

        function processAIResponse(rawText) {
            const jsonRegex = /\{.*?\}/g;
            const matches = rawText.match(jsonRegex);
            let spokenReply = rawText;

            if (matches) {
                matches.forEach(jsonStr => {
                    try {
                        const action = JSON.parse(jsonStr);
                        executeAction(action);
                        spokenReply = spokenReply.replace(jsonStr, '');
                    } catch(e) {}
                });
            }

            // Remove markdown code block fences if the AI still included them
            spokenReply = spokenReply.replace(/```json/gi, '').replace(/```/g, '').trim();
            elements.aiReply.textContent = spokenReply;
            Speaker.speak(spokenReply);
        }

        function executeAction(action) {
            if (action.action === 'fill') {
                const { field, value } = action;
                const el = document.getElementById(field);
                if (field === 'skills') { addSkill(value); return; }
                if (el) {
                    if (el.type === 'radio') {
                        const radio = document.querySelector(`input[name="${field}"][value="${value}"]`);
                        if (radio) radio.checked = true;
                    } else if (el.type === 'checkbox') {
                        el.checked = (value === true || value === 'true');
                    } else {
                        el.value = value;
                    }
                    const group = el.closest('.form-group');
                    group.classList.add(CONFIG.FIELD_HIGHLIGHT_CLASS);
                    el.classList.add(CONFIG.FIELD_SUCCESS_CLASS);
                    setTimeout(() => group.classList.remove(CONFIG.FIELD_HIGHLIGHT_CLASS), 1500);
                }
                updateProgress();
            }
        }

        function updateProgress() {
            let filled = 0;
            state.formFields.forEach(f => {
                const el = document.getElementById(f);
                if (el) {
                    if (el.type === 'checkbox') return;
                    if (el.type === 'radio') {
                        if (document.querySelector(`input[name="${f}"]:checked`)) filled++;
                    } else if (el.value) filled++;
                }
            });
            if (state.skills.length > 0) filled++;
            const total = state.formFields.length - 1;
            const percent = (filled / total) * 100;
            elements.formProgress.style.width = `${percent}%`;
            if (percent >= 100) { elements.submitBtn.classList.add('enabled'); elements.submitBtn.disabled = false; }
        }

        function addSkill(skill) {
            if (!skill || state.skills.includes(skill)) return;
            state.skills.push(skill);
            renderSkills();
            updateProgress();
        }

        function renderSkills() {
            elements.skillsList.innerHTML = '';
            state.skills.forEach(skill => {
                const tag = document.createElement('div');
                tag.className = 'skill-tag';
                tag.innerHTML = `${skill} <span style="cursor:pointer" id="remove-${skill}">&times;</span>`;
                elements.skillsList.appendChild(tag);
                document.getElementById(`remove-${skill}`).onclick = () => removeSkill(skill);
            });
        }

        function removeSkill(skill) {
            state.skills = state.skills.filter(s => s !== skill);
            renderSkills();
            updateProgress();
        }

        elements.micBtn.addEventListener('click', () => {
            if (Recognition.isListening()) Recognition.stop();
            else Recognition.start();
        });

        elements.skillsInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { addSkill(elements.skillsInput.value); elements.skillsInput.value = ''; }
        });

        elements.submitBtn.addEventListener('click', () => {
            if (elements.submitBtn.classList.contains('enabled')) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                Speaker.speak("Onboarding complete! Data exported to console.");
                console.log("Form Data:", state);
                alert("Form Submitted!");
            }
        });

        function handleVoiceInput(text) { if (text.trim().length < 2) return; callGemini(text); }

        updateProgress();
        setTimeout(() => {
            if (!state.apiKey) elements.aiReply.textContent = "System Error: API key not found in .env";
            else Speaker.speak("Hi! I'm your voice assistant. Ready to help!");
        }, 1000);
    </script>
</body>
</html>
